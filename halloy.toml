# Halloy config.
#
# For a complete list of available options,
# please visit https://halloy.chat/configuration.html


check_for_update_on_launch = true
theme = "custom"

[servers.calltheory]
nickname = "ccvXX"
server = "irc.calltheory.com"
use_tls = true
port = 6697
channels = ["#support","#callcentervillage"]

[buffer.chathistory]
infinite_scroll = true

[buffer.text_input]
auto_format = "all"

[buffer.timestamp]
copy_format = "%Y-%m-%d %H:%M:%S"
format = "%Y-%m-%d %H:%M:%S"


[actions.buffer]
click_channel_name = "replace-pane"
click_highlight = "replace-pane"
click_username = "replace-pane"
local = "replace-pane"
message_channel = "replace-pane"
message_user = "replace-pane"

[actions.sidebar]
buffer = "replace-pane"

[context_menu.padding]
entry = [6, 12]

[font]
size = 18

[sidebar.unread_indicator]
title = true
icon = "star"
query_as_highlight = true

[pane.gap]
inner = 10
outer = 10
